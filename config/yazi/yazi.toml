# yazi configuration
# Docs: https://yazi-rs.github.io/docs/configuration/yazi

[mgr]
ratio          = [0, 4, 3]   # parent : current : preview (parent hidden — too noisy with 96 siblings)
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5

[preview]
wrap          = "no"
tab_size      = 2
max_width     = 600
max_height    = 900
image_delay   = 30
image_filter  = "triangle"
image_quality = 75

# ─── Openers ─────────────────────────────────────────────────────────
# `edit` runs nvim inside the yazi pane and blocks until you quit —
# :q / ZZ drops you straight back into yazi.
[opener]
edit = [
  { run = 'nvim "$@"', desc = "nvim", block = true, for = "unix" },
]
reveal = [
  { run = 'open -R "$1"', desc = "Reveal in Finder", for = "macos" },
]
open = [
  { run = 'open "$@"', desc = "Open with default app", for = "macos" },
]
markedit = [
  { run = 'open -a MarkEdit "$@"', desc = "MarkEdit", orphan = true, for = "macos" },
]

[open]
prepend_rules = [
  # Markdown → MarkEdit by default (Enter); nvim still available via `O`.
  # Match by `url` (path glob) — `.md` detects as text/plain so mime can't single
  # it out, and `[open]` rules don't accept `name`. Must precede the text/* rule.
  { url = "*.md",                    use = ["markedit", "edit", "reveal"] },
  { url = "*.markdown",              use = ["markedit", "edit", "reveal"] },
  { mime = "text/*",                 use = ["edit", "reveal"] },
  { mime = "application/json",       use = ["edit", "reveal"] },
  { mime = "application/javascript", use = ["edit", "reveal"] },
  { mime = "application/typescript", use = ["edit", "reveal"] },
  { mime = "application/x-yaml",     use = ["edit", "reveal"] },
  { mime = "application/toml",       use = ["edit", "reveal"] },
  { mime = "application/xml",        use = ["edit", "reveal"] },
]
