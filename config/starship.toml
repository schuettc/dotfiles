"$schema" = 'https://starship.rs/config-schema.json'

# Performance settings
scan_timeout = 10
command_timeout = 500

# Two-line prompt with p10k-style frame
format = """
[‚ē≠‚ĒÄ](overlay1)\
[](fg:surface0)\
$os\
$username\
[](bg:blue fg:surface0)\
$directory\
[](fg:blue bg:yellow)\
$git_branch\
$git_status\
[](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$deno\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
$ruby\
$lua\
$terraform\
$kubernetes\
[](fg:green bg:sapphire)\
$docker_context\
$conda\
$aws\
[](fg:sapphire)\
[‚ĒÄ‚ēģ](overlay1)
[‚ēį‚ĒÄ](overlay1)$character"""

right_format = ""

palette = 'catppuccin_mocha'

[os]
disabled = false
style = "bg:surface0 fg:text"
format = '[ $symbol ]($style)'

[os.symbols]
Windows = "ůįĖ≥"
Ubuntu = "ůįēą"
SUSE = "ůįīĶ"
Raspbian = "ůįźŅ"
Mint = "ůį£≠"
Macos = "ůįÄĶ"
Manjaro = "ůįīĶ"
Linux = "ůįĆĹ"
Gentoo = "ůį£®"
Fedora = "ůį£õ"
Alpine = "ůįīĶ"
Amazon = "ůįłŹ"
Android = "ůįÄ≤"
Arch = "ůį£á"
CentOS = "ůįīĶ"
Debian = "ůį£ö"
Redhat = "ůĪĄõ"
RedHatEnterprise = "ůĪĄõ"

[username]
show_always = false
style_user = "bg:surface0 fg:text"
style_root = "bg:red fg:crust"
format = '[$user]($style)'

[directory]
style = "bg:blue fg:crust"
format = "[ $path ]($style)"
truncation_length = 2
truncation_symbol = "‚Ä¶/"
read_only = " ůįĆĺ"
truncate_to_repo = true

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = " "
"Music" = "ůįĚö "
"Pictures" = " "
"Developer" = "ůį≤č "
"GitHub" = " "

[git_branch]
symbol = "ůįäĘ "
style = "bg:yellow fg:crust"
format = '[ $symbol$branch ]($style)'
truncation_length = 12
truncation_symbol = "‚Ä¶"

[git_status]
style = "bg:yellow fg:crust"
format = '[$all_status$ahead_behind ]($style)'
ahead = "‚á°${count}"
behind = "‚á£${count}"
diverged = "‚áē‚á°${ahead_count}‚á£${behind_count}"
untracked = "?${count}"
stashed = ""
modified = "!${count}"
staged = "+${count}"
renamed = "¬Ľ${count}"
deleted = "‚úė${count}"
ignore_submodules = true

[nodejs]
symbol = "ůįéô"
style = "bg:green fg:crust"
format = '[ $symbol $version ]($style)'
detect_extensions = []
detect_files = ['package.json', '.node-version']
detect_folders = ['node_modules']

[c]
symbol = "ůįôĪ"
style = "bg:green fg:crust"
format = '[ $symbol $version ]($style)'

[rust]
symbol = "ůĪėó"
style = "bg:green fg:crust"
format = '[ $symbol $version ]($style)'

[golang]
symbol = "ůįüď"
style = "bg:green fg:crust"
format = '[ $symbol $version ]($style)'

[php]
symbol = "ůįĆü"
style = "bg:green fg:crust"
format = '[ $symbol $version ]($style)'

[java]
symbol = "ůįĆĄ"
style = "bg:green fg:crust"
format = '[ $symbol $version ]($style)'

[kotlin]
symbol = "ůĪąô"
style = "bg:green fg:crust"
format = '[ $symbol $version ]($style)'

[haskell]
symbol = "ůį≤í"
style = "bg:green fg:crust"
format = '[ $symbol $version ]($style)'

[python]
symbol = "ůįĆ†"
style = "bg:green fg:crust"
format = '[ $symbol $version (\($virtualenv\)) ]($style)'

[ruby]
symbol = "ůįī≠"
style = "bg:green fg:crust"
format = '[ $symbol $version ]($style)'

[lua]
symbol = "ůįĘĪ"
style = "bg:green fg:crust"
format = '[ $symbol $version ]($style)'

[deno]
symbol = "ůįõ¶"
style = "bg:green fg:crust"
format = '[ $symbol $version ]($style)'

[bun]
symbol = "ůį§á"
style = "bg:green fg:crust"
format = '[ $symbol $version ]($style)'

[terraform]
symbol = "ůĪĀĘ"
style = "bg:green fg:crust"
format = '[ $symbol $version ]($style)'
detect_files = ['.terraform.lock.hcl']
detect_folders = []
detect_extensions = ['tf', 'tfvars']

[kubernetes]
symbol = "ůĪÉĺ"
style = "bg:green fg:crust"
format = '[ $symbol $context ]($style)'
disabled = false
detect_files = []
detect_folders = []
detect_env_vars = ['KUBECONFIG']
contexts = []

[docker_context]
symbol = "ůį°®"
style = "bg:sapphire fg:crust"
format = '[ $symbol $context ]($style)'
only_with_files = true


[aws]
symbol = "ůįłŹ "
style = "bg:sapphire fg:crust"
format = '[$symbol($profile )(\($region\) )]($style)'
disabled = false

[character]
disabled = false
success_symbol = '[‚ĚĮ](bold fg:green)'
error_symbol = '[‚ĚĮ](bold fg:red)'
vimcmd_symbol = '[‚Ěģ](bold fg:green)'
vimcmd_replace_one_symbol = '[‚Ěģ](bold fg:lavender)'
vimcmd_replace_symbol = '[‚Ěģ](bold fg:lavender)'
vimcmd_visual_symbol = '[‚Ěģ](bold fg:yellow)'

