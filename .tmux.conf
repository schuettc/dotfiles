# ============================================================
# tmux configuration — starter, opinionated, macOS + Ghostty
# Reload in tmux with:  prefix r   (or:  tmux source ~/.tmux.conf)
# ============================================================

# ---- Prefix --------------------------------------------------
# Switch from Ctrl-B → Ctrl-A (easier reach, common preference)
set -g prefix C-a
unbind C-b
bind C-a send-prefix          # press Ctrl-A twice to send literal Ctrl-A

# ---- General behavior ---------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB"
set -g mouse on               # scroll, click panes, drag to resize
set -g history-limit 100000   # match Ghostty scrollback
set -g escape-time 10         # snappier ESC in vim/etc.
set -g focus-events on        # ON so the attention-flag clears on focus (client-focus-in
                              # hook below needs focus reporting). We had this OFF to stop
                              # Claude's INLINE focus-repaint tearing — but the fullscreen
                              # renderer (CLAUDE_CODE_NO_FLICKER) now owns the screen and
                              # repaints cleanly, so focus-events are safe again. (Only a
                              # `/tui default` session could still tear on focus → prefix R.)
# Ported from tmux-sensible (removed) — its only two defaults worth keeping:
set -g display-time 4000      # status messages linger 4s, not the ~0.75s default
set -g status-keys emacs      # emacs-style editing in the command prompt
# Pass modified keys (CSI-u / extended keys) through to the inner app so
# Claude Code chords like shift+tab (Plan Mode) work inside tmux. Ghostty
# still intercepts shift+enter/ctrl+enter first via its own keybinds.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
# Advertise synchronized-output (DECSET ?2026) support for Ghostty. Ghostty's
# terminfo has Sync but tmux wasn't passing it through, so Claude Code's atomic
# frame updates got torn into stale/orphaned input-box frames during heavy
# streaming. With Sync, tmux buffers a synchronized update and flushes it to
# Ghostty atomically → no half-drawn frames. (Fixes the redraw-residue artifact.)
set -as terminal-features 'xterm-ghostty:Sync'
# Forward OSC 7 (current working directory) from inner shells to Ghostty.
# Required for ⌘T (new Ghostty tab) to inherit the project's cwd when
# you're attached to a tmux session — otherwise Ghostty falls back to
# the cwd from before `tmux attach`, breaking the workspace auto-join.
set -g allow-passthrough on
# Push the active tmux session name out to the outer terminal (Ghostty).
# Ghostty uses this for the tab bar + window title + app-switcher menu.
# Result: instead of "proj" (the last command name), each tab/window shows
# the project name like "mlb-dk", "mlb-dk-2", etc.
set -g set-titles on
# Prepend 🔔 when a session has the Claude attention flag (@claude_attn), set by
# `claude-attn` on the Notification hook. This surfaces in the Ghostty tab bar,
# the ⌘-Tab app switcher, AND the Dock-icon window list — so you can see at a
# glance which session is waiting for you. Cleared by the focus hooks below.
# Append the manual task label (@claude_task, set via prefix T) so parallel
# sessions in the same project are tellable apart: "workspace-3 · writing docs".
# The muster slot lives at the END — after the prefix-T label, never
# interrupting the name·label reading order — and is ONE place with three
# states: bright 📬N (unread mail, wins the slot), dim lone @ (registered,
# address = the session name you're reading), dim @alias list (address
# DIFFERS from #S — custom/multi alias; also self-corrects after a session
# rename). The alias IS the bus's canonical mailbox address (proj:label and
# bare labels merely resolve to it); the hook auto-registers alias = #S, so
# equal-case gets no spelled-out name and the title shows differ-only. No
# emoji in idle states — they ignore dim fg colors; 📬 means unread, always.
# prefix @ copies the alias; prefix m nudges the agent to drain its inbox.
set -g set-titles-string '#{?@claude_attn,🔔 ,}#S#{?@claude_task, · #{@claude_task},}#{?@muster_inbox, · 📬#{@muster_inbox},#{?#{&&:#{@muster_agent},#{!=:#{@muster_agent},#S}}, · @#{@muster_agent},}}'

# Drop a session's attention flag the moment you switch to / focus it — you've
# seen it. `-b` runs it in the background so focus changes never stall; the
# helper no-ops when nothing is flagged, so these high-frequency hooks are cheap.
# NOTE: tmux 3.6 uses `client-focus-in` (fires when the terminal/tab gains focus);
# `pane-focus-in` is NOT a valid global hook here and silently did nothing.
set-hook -g client-focus-in        'run-shell -b "~/.local/bin/claude-attn clear #{session_name} 2>/dev/null || true"'
set-hook -g client-session-changed 'run-shell -b "~/.local/bin/claude-attn clear #{session_name} 2>/dev/null || true"'

set -g base-index 1           # windows start at 1, not 0
setw -g pane-base-index 1     # same for panes
set -g renumber-windows on    # tidy window numbers when one closes

# ---- Activity / bell awareness (Claude integration) ---------
# When a pane writes BEL (\a) or has activity, mark the window in the status
# bar so we can see Claude finished / wants attention from any session.
setw -g monitor-bell on
setw -g monitor-activity on
set  -g visual-bell off            # don't beep audibly — the indicator is enough
set  -g visual-activity off
set  -g bell-action other          # ring bell from any pane except the focused one
# Style the indicator on the window in the status bar
setw -g window-status-bell-style 'fg=#1e1e2e,bg=#fab387,bold'     # peach for bell (urgent)
setw -g window-status-activity-style 'fg=#1e1e2e,bg=#94e2d5'      # teal for activity (Claude turn ended)

# ---- Splits & windows ---------------------------------------
# Intuitive split keys: | for vertical, - for horizontal
# Both open the new pane in the current pane's working dir
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"   # new window in same dir

# ---- Vim-style pane navigation ------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (hold prefix, repeat with H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# ---- Quick session/config ergonomics ------------------------
bind r source-file ~/.tmux.conf \; display "Reloaded"
bind C-l send-keys 'C-l'      # ctrl-a ctrl-l clears the screen

# Task label for this session (prefix T) — the ONE naming gesture. Routes
# through `muster label`, which fans the name out to every surface at once:
#   1. tmux: sets @claude_task + @claude_task_manual and refreshes titles
#      (Ghostty tab bar / Dock / ⌘-Tab, status bar, proj picker) — identical
#      writes to the old inline set-option incantation.
#   2. muster bus: pushes the stored label so proj:label / bare-label
#      addressing works immediately for MCP senders (not just the CLI).
#   3. Claude Code: types `/rename <label>` into this session's registered
#      live Claude pane so Claude's session name follows — ONLY when the
#      roster names a live claude agent here; a plain shell gets no typing.
# Pre-filled with the current label; empty input clears it everywhere (and
# never types into any pane). Manual-wins vs Claude's auto session-name sync
# is unchanged: statusline.sh backs off while @claude_task_manual is set;
# clearing hands the label back to Claude.
#
# Routed through bin/tmux-muster-label.sh, not muster directly: run-shell
# children get $TMUX but NOT $TMUX_PANE (which muster's ambient tmux calls
# need to resolve the session), and run-shell opens a full-screen view for
# any stdout — the shim re-exports the pane from #{pane_id} and folds
# muster's output into a status-line display-message instead.
bind T command-prompt -I '#{@claude_task}' -p 'task label:' 'run-shell -b "~/dotfiles/bin/tmux-muster-label.sh #{pane_id} \"%%\""'
# prefix @ — copy this session's muster alias(es) (@muster_agent, the bus's
# canonical mailbox address) to the clipboard; the status bar isn't
# mouse-selectable, so this is the copy/paste path for messaging an agent.
bind @ run-shell -b 'tmux show-options -qv @muster_agent | tr -d "\n" | pbcopy' \; display-message 'copied muster alias: #{@muster_agent}'
# prefix m — nudge this session's agent to check its muster inbox NOW.
# The Stop hook only drains mail when the agent finishes a turn; an agent
# sitting idle at its prompt never sees new mail until you type something.
# `muster nudge` types the full drain-and-act prompt into the registered
# pane (and auto-submits for claude). Targets the first alias, falling back
# to the session name.
# stdout must stay silent: run-shell pops an output view pane for ANY output,
# so the confirmation goes to the status line via display-message instead.
bind m run-shell -b 'a=$(tmux show-options -qv @muster_agent | cut -d, -f1); [ -n "$a" ] || a=$(tmux display-message -p "#S"); if ~/.local/bin/muster nudge "$a" >/dev/null 2>&1; then tmux display-message "muster: nudged $a"; else tmux display-message "muster: nudge $a failed"; fi'

# prefix g → ask this window's Claude lead to TaskStop its finished teammates.
# Finished teammates are deliberately persistent (they stay resumable), so each
# one holds a tmux pane and a pty forever; TaskStop is the only removal that
# also deregisters them from the team roster. Same silent-stdout rule as
# prefix m — the script confirms via display-message.
bind g run-shell -b "~/dotfiles/bin/tmux-teammate-gc.sh"

# Force the focused pane's app to repaint WITHOUT disturbing the split — nudge
# its width 1 col and back (net-zero), which SIGWINCHes the app into a full
# redraw. Clears the orphaned input-box frame Claude Code strands during heavy
# streaming, unlike prefix-z (which hides the yazi sidebar). For a vertical
# split swap to: resize-pane -U 1 \; resize-pane -D 1
bind R resize-pane -L 1 \; resize-pane -R 1 \; display "↻ repaint"

# ---- Copy mode: vim keys + macOS clipboard ------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Route mouse-scroll on a Claude pane (DEFAULT renderer) into tmux copy-mode
# (clean scrollback) instead of forwarding the wheel to Claude — its inline
# scroll-repaint tears under tmux. Detection: command looks like a version
# (2.1.174) AND the pane is NOT on the alternate screen. In `/tui fullscreen`
# the pane IS alt-screen, so we fall through and let Claude scroll its own
# viewport natively. yazi / shells / other mouse apps also fall through.
bind -n WheelUpPane if -F "#{&&:#{m/r:^[0-9]+[.][0-9]+,#{pane_current_command}},#{!=:#{alternate_on},1}}" {
  copy-mode -e
  send-keys -X -N 3 scroll-up
} {
  if -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -e }
}

# ---- Status bar (Catppuccin Mocha-ish, minimal) -------------
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
# Attention banner (peach) lists any OTHER session with a pending bell —
# i.e. a Claude that finished / wants input that you haven't visited yet.
# Empty when nothing needs you. Followed by the current session name in a
# stable name-hashed color (each session keeps its own color), then the
# manual task label (prefix T) in lavender when one is set.
set -g status-left  "#(~/dotfiles/bin/tmux-attention.sh)#(~/dotfiles/bin/tmux-session-color.sh '#S')#{?@claude_task,#[fg=#b4befe]#{@claude_task} #[default],}#{?@muster_inbox,#[fg=#1e1e2e#,bg=#89dceb#,bold] 📬#{@muster_inbox} #[default] ,#{?@muster_agent,#[fg=#6c7086]#{?#{!=:#{@muster_agent},#S},@#{@muster_agent},@}#[default] ,}}"
set -g status-left-length 120
# Status-right elements (left → right):
#   • git branch + dirty count for the focused pane's cwd
#   • Claude context-% indicator (only shown when the focused pane is running
#     Claude — read from per-pane state files written by statusline.sh)
#   • date/time
#
# Both helpers emit their own Catppuccin-colored format directives. They
# refresh on the status-interval (every 5 s).
set -g status-interval 5
set -g status-right-length 100
set -g status-right "#(~/dotfiles/bin/tmux-git-status.sh '#{pane_current_path}')  #(~/dotfiles/bin/tmux-claude-context.sh '#{pane_id}')   #[fg=#a6adc8]%a %b %d  %H:%M "
set -g window-status-current-style "fg=#1e1e2e,bg=#89b4fa,bold"
# `_sbhold` is the hidden holding window prefix f parks live agent panes in
# while the right column is collapsed (see bin/tmux-sidebar-toggle.sh). Render
# it as nothing so the parked panes don't show up as a stray tab.
set -g window-status-format  "#{?#{==:#{window_name},_sbhold},, #I:#W }"
set -g window-status-current-format "#{?#{==:#{window_name},_sbhold},, #I:#W }"
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ============================================================
# Right-column toggle (prefix f)
# (Overrides tmux's default find-window, which is rarely used since
#  prefix s gives an interactive session picker.)
# ============================================================
# prefix f → toggle the whole right column (scratch + yazi + terminal + any
# live agent panes) as one unit. Collapsing parks the agent panes in the hidden
# `_sbhold` window (break-pane, so the subagents keep running) and kills the
# @sidebar-tagged panes, giving main the full width; restoring rebuilds the
# stack and joins the parked agents back below the terminal in order.
bind f run-shell -b "~/dotfiles/bin/tmux-sidebar-toggle.sh"

# ============================================================
# Pin the main (left) pane when an agent pane spawns
# ------------------------------------------------------------
# Claude Code's agent-teams (--tmux) spawns each subagent as a new
# pane stacked below yazi, then widens it for readability. That drags
# the whole right column leftward and squishes the main pane. These
# hooks re-pin the top-left (main) pane to 70% whenever a pane is
# split or resized in a 3+ pane window, so the left pane keeps the
# width it had before the agent appeared. The 70% pairs with yazi's
# `-l 30%` above — change both together if you retune the split.
# The `window_panes >= 3` guard means normal main+yazi (2-pane)
# resizing is untouched; only agent/3-pane layouts are pinned.
#
# `@agent_pin` (default 1) gates the hooks so the pin can be toggled
# off when you want to hand-resize a 3-pane window — see `prefix P`
# below. When off, the hooks fire but do nothing.
# ============================================================
set -g @agent_pin 1
set-hook -g after-split-window "if-shell -F '#{&&:#{@agent_pin},#{>=:#{window_panes},3}}' 'resize-pane -t \"{top-left}\" -x 70%'"
set-hook -g after-resize-pane  "if-shell -F '#{&&:#{@agent_pin},#{>=:#{window_panes},3}}' 'resize-pane -t \"{top-left}\" -x 70%'"

# prefix P → toggle the agent pane-pin on/off.
#   OFF: hand-resize a 3-pane window freely (main won't snap back).
#   ON : re-enables the pin and immediately re-snaps the current
#        window to 70% if it has 3+ panes.
bind P if-shell -F '#{@agent_pin}' \
  'set -g @agent_pin 0 ; display-message "agent pane-pin: OFF — manual resize free"' \
  'set -g @agent_pin 1 ; if-shell -F "#{>=:#{window_panes},3}" "resize-pane -t \"{top-left}\" -x 70%" ; display-message "agent pane-pin: ON"'

# ============================================================
# Plugins (TPM)
# After editing this file:
#   prefix r      → reload config
#   prefix I      → install new plugins (capital I)
#   prefix U      → update plugins
#   prefix alt-u  → uninstall plugins no longer in the list
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
# tmux-sensible removed: nearly everything it set is either explicitly configured
# above or unwanted (it force-set focus-events on, aggressive-resize on, and a
# `bind R` that collided with our repaint binding). Its two worthwhile defaults
# (display-time, status-keys) are ported into the General behavior section.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect: restore named programs + window/pane LAYOUT only.
# Pane-CONTENTS capture is intentionally OFF: restore replays the saved screen
# verbatim (`cat <file>` into the pane), which re-injects any escape sequences
# that were on screen — e.g. a one-time XTVERSION/DA leak (`ghostty <ver>;…c`)
# got baked in and replayed on every restart, accumulating across saves. Process
# + layout restore is the useful 95%; screen-replay is the fragile part. Keep off.
set -g @resurrect-capture-pane-contents 'off'
set -g @resurrect-processes 'claude vim nvim ssh "~yazi"'

# tmux-continuum: auto-save every 15 min. Auto-restore is OFF — a server start
# brings back a clean slate, not the whole graveyard of saved sessions. Pull
# projects back one at a time (proj) and `claude --resume`/`--continue` per pane.
# The 15-min save still runs, so a manual `prefix Ctrl-r` restore is there if
# you ever want the old layout back.
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

# Initialize TPM (must be the very last line of this file).
# -b matters: a blocking `run` holds tmux's config-load queue open until tpm
# exits, and hook NOTIFICATIONS (client-focus-in etc.) dispatch through that
# same queue — a hung tpm silently freezes every hook on the server (bells
# never clear). We hit exactly that when tpm wedged during a brew upgrade.
run -b '~/.tmux/plugins/tpm/tpm'
